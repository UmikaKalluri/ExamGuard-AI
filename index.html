<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamGuard AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="top-bar">
    <h1> ExamGuard AI</h1>
    <p class="tagline">
        AI-Powered Smart Examination Monitoring
    </p>
`
    <button
        onclick="toggleTheme()"
        class="theme-btn">

        🌙 Dark Mode
    </button>
    </div>
        <p class="subtitle">Predicting Exam Fraud Before It Happens</p>

        <div class="card">

            <label>Total Students Appearing</label>
            <input type="number" id="students" placeholder="Enter student count">

            <label>Historical Malpractice Data</label>
            <input type="number" id="malpractice" placeholder="Enter cases">

            <label>Surveillance Coverage(%)</label>
            <input type="number" id="camera" placeholder="Enter coverage">

            <label>Active Invigilators Assigned</label>
            <input type="number" id="invigilators" placeholder="Enter invigilators">

            <label>Seating Proximity</label>
            <input type="number" id="density" placeholder="Enter density">

            <button onclick="analyzeRisk()">
                Analyze Fraud Risk
            </button>

            <button onclick="resetForm()" class="reset-btn">
                Reset Form
            </button>

            <button onclick="viewHistory()" class="history-btn">
                View History
            </button>

            <button onclick="downloadReport()" class="download-btn">
                Download Report
            </button>

            <button onclick="logout()" class="logout-btn">
                Logout
            </button>

            <div id="historySection"></div>

        </div>
        
        <div id="result" class="result-box">
            <h2>Fraud Analysis Report</h2>
            <p>Your results will appear here.</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
